version: "3.8"

services:
  booking-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hotelio-booking-service
    ports:
      - "9090:80"
    networks:
      - hotelio-net
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__HotelioBookingDb=Host=host.docker.internal;Port=5434;Database=hotelio_booking_service;Username=hotelio;Password=hotelio;Timeout=300;CommandTimeout=300;
      - HOTELIO_MONOLITH_HOST=host.docker.internal
      - HOTELIO_MONOLITH_PORT=8084
      - KAFKA_BOOTSTRAP_SERVERS=host.docker.internal:9092
    depends_on:
      booking-service-db:
        required: true
        condition: service_started
  
  history-service:
    build:
      context: ../hotelio-history-service
      dockerfile: Dockerfile
    container_name: hotelio-history-service
    networks:
      - hotelio-net
    environment:
      - DOTNET_ENVIRONMENT=Production
      - ConnectionStrings__HotelioHistoryDb=Host=host.docker.internal;Port=5434;Database=hotelio_history_service;Username=hotelio;Password=hotelio;Timeout=300;CommandTimeout=300;
      - KAFKA_BOOTSTRAP_SERVERS=host.docker.internal:9092
    depends_on:
      booking-service:
        required: true
        condition: service_started
      kafka:
        required: true
        condition: service_healthy
          
        
  
  monolith:
    build:
      context: ../tasks/monolith
      dockerfile: Dockerfile
    container_name: hotelio-monolith
    ports:
      - "8084:8080"
    networks:
      - hotelio-net
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://monolith-db:5432/hotelio
      SPRING_DATASOURCE_USERNAME: hotelio
      SPRING_DATASOURCE_PASSWORD: hotelio
      BOOKING_SERVICE_EXTERNAL_HOST: host.docker.internal
      BOOKING_SERVICE_EXTERNAL_PORT: 9090
    depends_on:
      monolith-db:
        required: true
        condition: service_started
      booking-service:
        required: true
        condition: service_started

  booking-service-db:
    image: postgres:15
    container_name: hotelio-booking-service-db
    environment:
      POSTGRES_USER: hotelio
      POSTGRES_PASSWORD: hotelio
      POSTGRES_DB: hotelio_booking_service
    ports:
      - "5434:5432"
    volumes:
      - booking-service-db-data:/var/lib/postgresql/data
    networks:
      - hotelio-net
  
  monolith-db:
    image: postgres:15
    container_name: hotelio-db
    environment:
      POSTGRES_USER: hotelio
      POSTGRES_PASSWORD: hotelio
      POSTGRES_DB: hotelio
    ports:
      - "5432:5432"
    volumes:
      - monolith-db-data:/var/lib/postgresql/data
    networks:
      - hotelio-net

  kafka:
    image: confluentinc/cp-kafka:7.2.1
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: host.docker.internal:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://host.docker.internal:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - hotelio-net
    healthcheck:
      test: nc -z localhost 9092 || exit -1
      start_period: 15s
      interval: 5s
      timeout: 10s
      retries: 10
    depends_on:
       zookeeper:
         condition: service_started
         required: true
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.2.1
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - hotelio-net

volumes:
  monolith-db-data:
  booking-service-db-data:

networks:
  hotelio-net:
    external: true
