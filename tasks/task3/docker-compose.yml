version: '3.8'

services:
  apollo-gateway:
    build: ./gateway
    ports:
      - "4000:4000"
    depends_on:
      - booking-subgraph
      - hotel-subgraph

  booking-subgraph:
    build: ./booking-subgraph
    environment:
      - API_HOST_URL=http://host.docker.internal:8084
    ports:
      - "4001:4001"

  hotel-subgraph:
    build: ./hotel-subgraph
    environment:
      - API_HOST_URL=http://host.docker.internal:8084
    ports:
      - "4002:4002"
